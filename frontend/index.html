<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivanX Courier | Premium Logistics Management</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hero { display: flex; align-items: center; justify-content: space-between; padding: 6rem 10%; gap: 4rem; background: radial-gradient(circle at 90% 10%, rgba(15, 98, 254, 0.05) 0%, transparent 40%); }
        .hero-text h1 { font-size: 3.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 1.5rem; }
        .track-box { display: flex; background: white; padding: 0.5rem; border-radius: var(--radius-md); box-shadow: var(--shadow-md); margin-top: 2rem; border: 1px solid #E2E8F0; }
        .track-box input { border: none; padding: 1rem; width: 70%; font-size: 1rem; outline: none; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 10%; background: white; border-bottom: 1px solid #E2E8F0; }
        .nav-links a { text-decoration: none; color: var(--text-dark); margin-left: 2rem; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover { color: var(--primary); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="width: 180px; height: 45px;">
            <svg viewBox="0 0 500 120"><text x="10" y="80" font-family="'Poppins'" font-size="55" font-weight="800" fill="#0F62FE">Vivan<tspan fill="#FF7A00">X</tspan></text></svg>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="book.html" class="btn-primary" style="color:white; padding:0.5rem 1.2rem;">Book Now</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-text" style="flex: 1;">
            <span style="color: var(--secondary); font-weight: 700; letter-spacing: 2px; text-transform: uppercase;">Next-Gen Logistics</span>
            <h1>Lightning Fast <br><span style="color:var(--primary)">Courier Delivery</span></h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 500px;">Experience premium tracking, verified handlers, and secure end-to-end multi-city operations.</p>
            
            <div class="track-box">
                <input type="text" id="awbInput" placeholder="Enter Consignment/AWB Number...">
                <button onclick="handleTrack()" class="btn-primary" style="width: 30%;">Track Unit</button>
            </div>
            <div id="trackingResult" style="margin-top: 1.5rem; display: none;" class="card"></div>
        </div>
        <div class="hero-image" style="flex: 1; text-align: right;">
            <div style="background: linear-gradient(135deg, #0F62FE 0%, #FF7A00 100%); width: 100%; height: 400px; border-radius: var(--radius-lg); opacity: 0.9;"></div>
        </div>
    </section>

    <script>
        const API_URL = "https://your-backend-render-app.onrender.com/api"; // Render App URL

        async function handleTrack() {
            const awb = document.getElementById('awbInput').value.trim();
            const resultDiv = document.getElementById('trackingResult');
            if(!awb) return alert("Please type a valid sequence.");

            try {
                const res = await fetch(`${API_URL}/track/${awb}`);
                const data = await res.json();
                resultDiv.style.display = 'block';
                
                if(res.status === 404) {
                    resultDiv.innerHTML = `<p style="color:var(--secondary); font-weight:600;">${data.message}</p>`;
                } else {
                    resultDiv.innerHTML = `
                        <h4>Status: <span style="color:var(--primary)">${data.status}</span></h4>
                        <p><b>Current Hub:</b> ${data.currentLocation}</p>
                        <p><b>Est. Delivery:</b> ${data.estimatedDelivery}</p>
                    `;
                }
            } catch(err) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<p style="color:red;">Tracking engine unavailable sync.</p>`;
            }
        }
    </script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
