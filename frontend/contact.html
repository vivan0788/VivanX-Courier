<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Desk | VivanX Courier</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="card" style="max-width: 600px; margin: 4rem auto;">
        <h2>Connect with Support</h2>
        <form style="display:flex; flex-direction:column; gap:1rem; margin-top:1.5rem;">
            <input type="text" placeholder="Your Name" class="form-input" required>
            <input type="email" placeholder="Your Corporate Email" class="form-input" required>
            <textarea placeholder="Message Details..." class="form-input" style="height:120px;" required></textarea>
            <button class="btn-primary" type="button" onclick="alert('Message Sent!')">Send Inquiry</button>
        </form>
        <div style="margin-top: 2rem; border-top: 1px solid #E2E8F0; padding-top: 1.5rem; color: var(--text-muted);">
            <p><b>Email:</b> corporate@vivanxcourier.io</p>
            <p><b>Phone:</b> +91 XXXXXXXXXX</p>
        </div>
    </div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
