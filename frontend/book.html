<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Parcel | VivanX Courier</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="booking-container card" style="max-width: 800px; margin: 4rem auto;">
        <h2 style="color: var(--primary); margin-bottom: 1.5rem;">Create New Dispatch Order</h2>
        <form id="bookingForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div>
                    <h3>Sender Details</h3>
                    <input type="text" name="senderName" placeholder="Full Name" required class="form-input">
                    <input type="tel" name="senderMobile" placeholder="Mobile Number" required class="form-input">
                    <input type="email" name="senderEmail" placeholder="Email Address" required class="form-input">
                    <textarea name="senderAddress" placeholder="Full Address" required class="form-input"></textarea>
                </div>
                <div>
                    <h3>Receiver Details</h3>
                    <input type="text" name="receiverName" placeholder="Full Name" required class="form-input">
                    <input type="tel" name="receiverMobile" placeholder="Mobile Number" required class="form-input">
                    <input type="email" name="receiverEmail" placeholder="Email Address" required class="form-input">
                    <textarea name="receiverAddress" placeholder="Full Address" required class="form-input"></textarea>
                </div>
            </div>
            <hr style="border: 0; border-top: 1px solid #E2E8F0; margin: 2rem 0;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <input type="number" name="weight" step="0.1" placeholder="Weight (KG)" required class="form-input">
                <select name="parcelType" class="form-input" required>
                    <option value="">Select Parcel Type</option>
                    <option value="Document">Standard Document</option>
                    <option value="Box">Parcel Box / Merchandise</option>
                    <option value="Fragile">Fragile Goods</option>
                </select>
                <input type="date" name="pickupDate" required class="form-input">
                <input type="text" name="specialInstructions" placeholder="Special Instructions (Optional)" class="form-input">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 2rem;">Submit Booking Request</button>
        </form>
    </div>

    <div id="successModal" class="modal-overlay" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.6); align-items:center; justify-content:center;">
        <div class="card" style="max-width: 500px; text-align: center; background: white; padding: 3rem;">
            <i lucide="check-circle" style="color: #10B981; width:64px; height:64px; margin: 0 auto 1.5rem;"></i>
            <h3 style="margin-bottom: 0.5rem; color: var(--text-dark);">Request Submitted Successfully</h3>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1.5rem;">Thank you for choosing VivanX Courier.</p>
            <p style="background: #F1F5F9; padding: 1rem; border-radius: var(--radius-md); font-weight: 500; font-size: 0.9rem; line-height: 1.5; color: var(--text-dark);">
                Hamari team kuch hi ghanton ke andar call ya message ke dwara aapse contact karke aapki booking confirm karegi.
            </p>
            <button onclick="closeModal()" class="btn-primary" style="margin-top: 1.5rem; width: 100%;">Close</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const API_URL = "https://your-backend-render-app.onrender.com/api"; // Replace with live URL

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch(`${API_URL}/book`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(response.ok) {
                    document.getElementById('successModal').style.display = 'flex';
                    e.target.reset();
                } else {
                    alert('Submission failed. Please check field structures.');
                }
            } catch(err) {
                console.error(err);
                alert('Connection to core dispatch cluster failed.');
            }
        });

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }
    </script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
